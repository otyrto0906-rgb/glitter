<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>glitter — メンバーページ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --ink:#16130f;--ink-2:#48443e;--ink-3:#918d87;--ink-4:#bab6b0;
  --paper:#f8f5f0;--paper-2:#edeae3;--paper-3:#e0dcd3;
  --gold:#b08c3a;--gold-lt:#f5e9c8;
  --purple:#5046c8;--purple-2:#7b72e0;--purple-lt:#eceafc;
  --teal:#1a7060;--teal-lt:#d0ede8;
  --coral:#c04030;--coral-lt:#fce5e0;
  --r:10px;--r-lg:18px;--r-xl:24px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px}

/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:var(--paper);border:1px solid var(--paper-3);border-radius:var(--r-xl);padding:40px 36px;width:100%;max-width:380px}
.login-logo{font-family:'Shippori Mincho',serif;font-size:26px;font-weight:600;letter-spacing:.06em;margin-bottom:4px}
.login-logo em{font-style:normal;color:var(--purple)}
.login-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-3);letter-spacing:.2em;text-transform:uppercase;margin-bottom:32px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2);margin-bottom:7px}
.field input,.field select{width:100%;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--paper-2);border:1px solid var(--paper-3);border-radius:var(--r);outline:none;transition:border-color .2s,box-shadow .2s;appearance:none}
.field input[type=password]{letter-spacing:.12em}
.field input:focus,.field select:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-lt)}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--ink-3);pointer-events:none}
.btn{width:100%;padding:13px;margin-top:8px;font-family:'Shippori Mincho',serif;font-size:15px;font-weight:600;letter-spacing:.06em;color:#fff;background:var(--ink);border:none;border-radius:var(--r);cursor:pointer;transition:background .2s,transform .1s}
.btn:hover{background:var(--ink-2)}
.btn:active{transform:scale(.98)}
.login-err{font-size:12px;color:var(--coral);margin-top:10px;text-align:center;min-height:18px}
.login-hint{font-size:11px;color:var(--ink-3);text-align:center;margin-top:16px}

/* ── App shell ── */
.app{display:none}
.app.show{display:block}
.shell{max-width:900px;margin:0 auto;padding:0 24px 80px}
header{display:flex;align-items:center;justify-content:space-between;padding:32px 0 36px;border-bottom:1px solid var(--paper-3);margin-bottom:40px}
.logo{font-family:'Shippori Mincho',serif;font-size:24px;font-weight:600;letter-spacing:.06em}
.logo em{font-style:normal;color:var(--purple)}
.logo-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-3);letter-spacing:.18em;text-transform:uppercase;margin-top:3px}
.user-pill{display:flex;align-items:center;gap:10px}
.user-name{font-family:'Shippori Mincho',serif;font-size:14px;color:var(--ink-2)}
.logout-btn{font-size:11px;color:var(--ink-3);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'DM Sans',sans-serif}
.logout-btn:hover{color:var(--ink)}

/* ── Profile card ── */
.profile-card{background:var(--ink);color:var(--paper);border-radius:var(--r-xl);padding:32px;margin-bottom:32px;position:relative;overflow:hidden;animation:fadeUp .4s ease both}
.profile-card::before{content:'';position:absolute;right:-60px;top:-60px;width:200px;height:200px;border-radius:50%;background:var(--purple);opacity:.1}
.profile-card::after{content:'';position:absolute;right:20px;bottom:-40px;width:120px;height:120px;border-radius:50%;background:var(--teal);opacity:.07}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
.pc-left{}
.pc-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:rgba(255,255,255,.3);margin-bottom:8px}
.pc-name{font-family:'Shippori Mincho',serif;font-size:28px;font-weight:600;margin-bottom:4px}
.pc-meta{font-size:13px;color:rgba(255,255,255,.48);margin-bottom:14px}
.type-pill{display:inline-flex;align-items:center;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500}
.t1{background:rgba(80,70,200,.3);color:#b0a8f5}
.t2{background:rgba(26,112,96,.3);color:#78d4bc}
.t3{background:rgba(176,140,58,.3);color:#e8c870}
.t4{background:rgba(192,64,48,.3);color:#f0a090}
.t5{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
.pc-analysis{font-size:13px;line-height:1.85;color:rgba(255,255,255,.76);border-top:1px solid rgba(255,255,255,.1);padding-top:16px;margin-top:16px}
.radar-wrap{width:220px;height:180px;flex-shrink:0}

/* ── Axes ── */
.axes-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}
.ax-name{font-size:10px;color:rgba(255,255,255,.32);letter-spacing:.08em;margin-bottom:5px}
.ax-track{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.ax-fill{height:100%;border-radius:2px;background:var(--purple-2);transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.ax-val{font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}

/* ── Section ── */
.sec{margin-bottom:36px;animation:fadeUp .5s ease both}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-family:'Shippori Mincho',serif;font-size:15px;font-weight:600;color:var(--ink-2)}
.sec-pill{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:20px;background:var(--paper-2);color:var(--ink-3)}

/* ── Match grid ── */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.match-grid{grid-template-columns:1fr}}
.mc{background:var(--paper);border:1px solid var(--paper-3);border-radius:var(--r-lg);padding:18px;transition:border-color .2s,transform .2s,box-shadow .2s;animation:fadeUp .4s ease both}
.mc:hover{border-color:var(--purple);transform:translateY(-2px);box-shadow:0 8px 24px rgba(80,70,200,.08)}
.mc-top{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.rank-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;flex-shrink:0}
.rb-1{background:var(--gold-lt);color:var(--gold)}
.rb-2{background:var(--paper-2);color:var(--ink-2)}
.rb-3{background:var(--coral-lt);color:var(--coral)}
.rb-n{background:var(--paper-2);color:var(--ink-3);font-size:10px}
.compat-tag{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500}
.ct-k{background:var(--purple-lt);color:var(--purple)}
.ct-h{background:var(--teal-lt);color:var(--teal)}
.ct-o{background:var(--paper-2);color:var(--ink-3)}
.mc-name{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:600;margin-bottom:2px}
.mc-sub{font-size:12px;color:var(--ink-3);margin-bottom:10px}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.score-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--purple);min-width:40px}
.score-track{flex:1;height:4px;background:var(--paper-2);border-radius:2px;overflow:hidden}
.score-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--purple),var(--purple-2));transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.mc-reason{font-size:12px;line-height:1.75;color:var(--ink-2);border-top:1px solid var(--paper-3);padding-top:8px}

/* ── Member list ── */
.member-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.ml-card{background:var(--paper);border:1px solid var(--paper-3);border-radius:var(--r-lg);padding:14px 16px}
.ml-name{font-family:'Shippori Mincho',serif;font-size:14px;font-weight:600;margin-bottom:3px}
.ml-role{font-size:11px;color:var(--ink-3);margin-bottom:8px}
.ml-type{font-size:11px;padding:3px 8px;border-radius:20px;display:inline-block;font-weight:500}
.mt-1{background:var(--purple-lt);color:var(--purple)}
.mt-2{background:var(--teal-lt);color:var(--teal)}
.mt-3{background:var(--gold-lt);color:var(--gold)}
.mt-4{background:var(--coral-lt);color:var(--coral)}
.mt-5{background:var(--paper-2);color:var(--ink-3)}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- ── ログイン画面 ── -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">glitt<em>e</em>r</div>
    <div class="login-sub">Member Page</div>

    <div class="field">
      <label>あなたの名前</label>
      <div class="select-wrap">
        <select id="loginName">
          <option value="">選択してください</option>
        </select>
      </div>
    </div>

<!-- ── メインアプリ ── -->
<div class="app" id="app">

      <div>

      <div class="axes-row">
        <div><div class="ax-name">関心の広さ</div><div class="ax-track"><div class="ax-fill" id="axA" style="width:0%"></div></div><div class="ax-val" id="axAv"></div></div>

        <div><div class="ax-name">行動スタイル</div><div class="ax-track"><div class="ax-fill" id="axC" style="width:0%"></div></div><div class="ax-val" id="axCv"></div></div>
      </div>

    <!-- 相性TOP7 -->
    <div class="sec">
      <div class="sec-hdr">

      </div>
      <div class="match-grid" id="matchGrid"></div>

</div>

  '5_3':['安定感どうしで、信頼に基づいた関係が築けます。','堅実に物事を進められる関係です。','丁寧なコミュニケーションが関係を深めます。'],
  '5_4':['専門性をサポートし合える関係です。','互いの強みを補い合えます。','共通の課題を見つけると連携しやすくなります。'],
  '5_5':['バランス型どうし。様々な状況に柔軟に対応し合える関係です。','互いの適応力を活かした連携ができます。','明確な役割分担を決めると、より効果的に動けます。'],
};

// ── 状態 ─────────────────────────────────────────────────────
let MEMBERS = [];
let currentMember = null;
let radarChart = null;

// ── 起動：メンバー読込 ────────────────────────────────────────
window.addEventListener('DOMContentLoaded', loadMembers);

function loadMembers() {
  const cbName = 'glitterCb_' + Date.now();
  const timeout = setTimeout(() => {
    delete window[cbName];
    console.warn('メンバー読込タイムアウト');
  }, 12000);

  window[cbName] = function(data) {
    clearTimeout(timeout);
    delete window[cbName];
    const s = document.getElementById('jsonp-s');
    if (s) s.remove();
    MEMBERS = (data.members || []).map(m => ({
      ...m,
      axisA  : Number(m.axisA)   || 0,
      axisB  : Number(m.axisB)   || 0,
      flex   : Number(m.flex)    || 0,
      solid  : Number(m.solid)   || 0,
      typeId : Number(m.typeId)  || 5,
      domains: Number(m.domains) || 6,
    }));
    // 名前セレクトを生成
    const sel = document.getElementById('loginName');
    MEMBERS.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.name;
      opt.textContent = m.name;
      sel.appendChild(opt);
    });
  };

  const script = document.createElement('script');
  script.id  = 'jsonp-s';
  script.src = CONFIG.API_URL + '?callback=' + cbName;
  document.head.appendChild(script);
}

// ── ログイン ──────────────────────────────────────────────────
function doLogin() {
  const name = document.getElementById('loginName').value;
  const pw   = document.getElementById('loginPw').value;
  const err  = document.getElementById('loginErr');

  if (!name) { err.textContent = '名前を選択してください'; return; }
  if (pw !== CONFIG.PASSWORD) { err.textContent = 'パスワードが違います'; return; }

  const member = MEMBERS.find(m => m.name === name);
  if (!member) { err.textContent = 'メンバーデータが読み込まれていません。しばらくお待ちください。'; return; }

  err.textContent = '';
  currentMember = member;
  showApp();
}

function logout() {
  currentMember = null;
  document.getElementById('app').classList.remove('show');
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginPw').value = '';
  document.getElementById('loginName').value = '';
  if (radarChart) { radarChart.destroy(); radarChart = null; }
}

// ── アプリ表示 ────────────────────────────────────────────────
function showApp() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('app').classList.add('show');

  const m = currentMember;
  document.getElementById('headerName').textContent = m.name;
  document.getElementById('pcName').textContent = m.name;
  document.getElementById('pcMeta').textContent = [m.role, m.company, m.industry, m.age].filter(Boolean).join(' · ');

  const tb = document.getElementById('pcType');
  tb.textContent = m.typeName;
  tb.className = 'type-pill t' + m.typeId;

  const analyses = TYPE_ANALYSIS[m.typeId] || TYPE_ANALYSIS[5];
  document.getElementById('pcAnalysis').textContent = analyses[0];

  // 軸バー
  setTimeout(() => {
    document.getElementById('axA').style.width  = (m.axisA / 20 * 100) + '%';
    document.getElementById('axB').style.width  = ((m.axisB - 3) / 12 * 100) + '%';
    document.getElementById('axC').style.width  = (m.flex / 11 * 100) + '%';
    document.getElementById('axAv').textContent = m.axisA + ' / 20';
    document.getElementById('axBv').textContent = m.axisB + ' / 15';
    document.getElementById('axCv').textContent = m.flex  + ' / 11';
  }, 60);

  // レーダーチャート
  drawRadar(m);

  // TOP7
  const others = MEMBERS.filter(x => x.name !== m.name);
  const scored = others.map(x => ({ ...x, score: calcScore(m, x) }))
    .sort((a, b) => b.score - a.score).slice(0, 7);
  renderTop7(scored, m);

  // メンバー一覧
  renderMemberList();
}

// ── レーダーチャート ──────────────────────────────────────────
function drawRadar(m) {
  if (radarChart) radarChart.destroy();
  const ctx = document.getElementById('radarChart').getContext('2d');
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['関心の広さ', '革新指数', '行動速度', 'リスク許容', 'テック'],
      datasets: [{
        data: [
          Math.round(m.axisA / 20 * 10),
          Math.round((m.axisB - 3) / 12 * 10),
          Math.round(m.flex / 11 * 10),
          Math.round(m.flex / 11 * 10),
          Math.round(m.axisB / 15 * 10),
        ],
        fill: true,
        backgroundColor: 'rgba(80,70,200,0.18)',
        borderColor: '#7b72e0',
        borderWidth: 2,
        pointBackgroundColor: '#7b72e0',
        pointRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        r: {
          min: 0, max: 10,
          ticks: { display: false },
          grid: { color: 'rgba(255,255,255,0.12)' },
          pointLabels: { font: { size: 10, family: 'DM Sans' }, color: 'rgba(255,255,255,0.45)' },
          angleLines: { color: 'rgba(255,255,255,0.1)' },
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

// ── 相性スコア計算 ────────────────────────────────────────────
function calcScore(a, b) {
  const sA    = Math.round((1 - Math.abs(a.axisA - b.axisA) / 20) * 20);
  const sB    = Math.round((1 - Math.abs(a.axisB - b.axisB) / 12) * 20);
  const sC    = Math.round((Math.abs(a.flex - b.solid) + Math.abs(b.flex - a.solid)) / 20 * 25);
  const maxD  = Math.max(a.domains, b.domains, 1);
  const sD    = Math.round(Math.min(a.domains, b.domains) / maxD * 20);
  const bonus = BONUS[`${a.typeId}_${b.typeId}`] ?? 8;
  return Math.min(100, sA + sB + sC + sD + bonus);
}

function getComment(aId, bId, score) {
  const arr = COMPAT_COMMENTS[`${aId}_${bId}`] || ['ビジネスの接点を見つけ、新しい関係を築けます。','様々な場面でのコラボレーションが期待されます。','互いの強みを活かせる場面を探しましょう。'];
  return arr[score >= 80 ? 0 : score >= 55 ? 1 : 2];
}

// ── TOP7 レンダリング ─────────────────────────────────────────
function renderTop7(scored, me) {
  document.getElementById('top7Count').textContent = scored.length + ' 名';
  const grid = document.getElementById('matchGrid');
  grid.innerHTML = '';

  scored.forEach((m, i) => {
    const rank   = i + 1;
    const compat = m.score >= 80 ? '◎ 共鳴型' : m.score >= 55 ? '◯ 補完型' : '△ 要調整';
    const ctCls  = m.score >= 80 ? 'ct-k' : m.score >= 55 ? 'ct-h' : 'ct-o';
    const rbCls  = rank===1?'rb-1':rank===2?'rb-2':rank===3?'rb-3':'rb-n';
    const comment = getComment(me.typeId, m.typeId, m.score);

    const card = document.createElement('div');
    card.className = 'mc';
    card.style.animationDelay = (i * 0.05) + 's';
    card.innerHTML = `
      <div class="mc-top">
        <div class="rank-badge ${rbCls}">${rank}</div>
        <div class="compat-tag ${ctCls}">${compat}</div>
      </div>
      <div class="mc-name">${m.name}</div>
      <div class="mc-sub">${[m.role, m.typeName].filter(Boolean).join(' · ')}</div>
      <div class="score-row">
        <div class="score-val">${m.score}</div>
        <div class="score-track"><div class="score-fill" style="width:0%" data-w="${m.score}"></div></div>
      </div>
      <div class="mc-reason">${comment}</div>
    `;
    grid.appendChild(card);
    setTimeout(() => {
      card.querySelector('.score-fill').style.width = m.score + '%';
    }, 100 + i * 60);
  });
}

// ── メンバー一覧 レンダリング ─────────────────────────────────
function renderMemberList() {
  document.getElementById('memberCount').textContent = MEMBERS.length + ' 名';
  const list = document.getElementById('memberList');
  list.innerHTML = '';

  MEMBERS.forEach(m => {
    const card = document.createElement('div');
    card.className = 'ml-card';
    const typeClass = 'mt-' + (m.typeId || 5);
    card.innerHTML = `
      <div class="ml-name">${m.name}</div>
      <div class="ml-role">${m.role || '—'}</div>
      <span class="ml-type ${typeClass}">${m.typeName || 'バランス型'}</span>
    `;
    list.appendChild(card);
  });
}
</script>
