<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>glitter — ゲスト相性診断</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:       #16130f;
  --ink-2:     #48443e;
  --ink-3:     #918d87;
  --ink-4:     #bab6b0;
  --paper:     #f8f5f0;
  --paper-2:   #edeae3;
  --paper-3:   #e0dcd3;
  --gold:      #b08c3a;
  --gold-lt:   #f5e9c8;
  --purple:    #5046c8;
  --purple-2:  #7b72e0;
  --purple-lt: #eceafc;
  --teal:      #1a7060;
  --teal-lt:   #d0ede8;
  --coral:     #c04030;
  --coral-lt:  #fce5e0;
  --r:         10px;
  --r-lg:      18px;
  --r-xl:      24px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px}

.shell{max-width:1100px;margin:0 auto;padding:0 28px 100px}

header{display:flex;align-items:flex-end;justify-content:space-between;padding:40px 0;border-bottom:1px solid var(--paper-3);margin-bottom:52px}
.logo{font-family:'Shippori Mincho',serif;font-size:28px;font-weight:600;letter-spacing:.06em}
.logo em{font-style:normal;color:var(--purple)}
.logo-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-3);letter-spacing:.2em;text-transform:uppercase;margin-top:4px}
.member-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-3);text-align:right}
.member-count strong{color:var(--purple);font-size:20px;display:block;line-height:1.1}
.mc-pulse{animation:mpulse 1s ease-in-out infinite}
@keyframes mpulse{0%,100%{opacity:1}50%{opacity:.3}}

.layout{display:grid;grid-template-columns:340px 1fr;gap:36px;align-items:start}
@media(max-width:820px){.layout{grid-template-columns:1fr}}

.panel{background:var(--paper-2);border:1px solid var(--paper-3);border-radius:var(--r-xl);padding:28px;position:sticky;top:24px}
.panel-title{font-family:'Shippori Mincho',serif;font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin-bottom:22px}
.field{margin-bottom:15px}
.field label{display:block;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2);margin-bottom:6px}
.field input,.field select{width:100%;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--paper);border:1px solid var(--paper-3);border-radius:var(--r);outline:none;transition:border-color .2s,box-shadow .2s;appearance:none}
.field input:focus,.field select:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-lt)}
.field input::placeholder{color:var(--ink-4)}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--ink-3);pointer-events:none}

.btn{width:100%;padding:14px;margin-top:10px;font-family:'Shippori Mincho',serif;font-size:15px;font-weight:600;letter-spacing:.06em;color:#fff;background:var(--ink);border:none;border-radius:var(--r);cursor:pointer;transition:background .2s,transform .1s}
.btn:hover{background:var(--ink-2)}
.btn:active{transform:scale(.98)}
.btn:disabled{background:var(--ink-3);cursor:not-allowed}

.results{min-height:400px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 24px;text-align:center;opacity:.4}
.empty-glyph{font-size:36px;margin-bottom:14px}
.empty-text{font-family:'Shippori Mincho',serif;font-size:14px;color:var(--ink-2);line-height:1.9}

.init-error{background:var(--coral-lt);border:1px solid var(--coral);border-radius:var(--r-lg);padding:20px 24px;margin-bottom:24px;display:none}
.init-error-title{font-size:13px;font-weight:500;color:var(--coral);margin-bottom:6px}
.init-error-msg{font-size:12px;color:var(--ink-2);line-height:1.7}

.guest-card{background:var(--ink);color:var(--paper);border-radius:var(--r-xl);padding:28px;margin-bottom:28px;position:relative;overflow:hidden;display:none}
.guest-card.show{display:block;animation:fadeUp .45s ease both}
.guest-card::before{content:'';position:absolute;right:-60px;top:-60px;width:200px;height:200px;border-radius:50%;background:var(--purple);opacity:.1}
.guest-card::after{content:'';position:absolute;right:20px;bottom:-40px;width:120px;height:120px;border-radius:50%;background:var(--teal);opacity:.07}
.gc-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:rgba(255,255,255,.3);margin-bottom:10px}
.gc-name{font-family:'Shippori Mincho',serif;font-size:24px;font-weight:600;margin-bottom:3px}
.gc-meta{font-size:13px;color:rgba(255,255,255,.48);margin-bottom:16px}
.type-pill{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;margin-bottom:14px}
.t1{background:rgba(80,70,200,.3);color:#b0a8f5}
.t2{background:rgba(26,112,96,.3);color:#78d4bc}
.t3{background:rgba(176,140,58,.3);color:#e8c870}
.t4{background:rgba(192,64,48,.3);color:#f0a090}
.t5{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
.gc-analysis{font-size:13px;line-height:1.85;color:rgba(255,255,255,.76);border-top:1px solid rgba(255,255,255,.1);padding-top:14px;margin-bottom:18px}
.axes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.ax-name{font-size:10px;color:rgba(255,255,255,.32);letter-spacing:.08em;margin-bottom:5px}
.ax-track{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.ax-fill{height:100%;border-radius:2px;background:var(--purple-2);transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.ax-val{font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}

.sec-hdr{display:none;align-items:center;justify-content:space-between;margin-bottom:18px}
.sec-hdr.show{display:flex}
.sec-title{font-family:'Shippori Mincho',serif;font-size:15px;font-weight:600;color:var(--ink-2)}
.sec-pill{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:20px;background:var(--paper-2);color:var(--ink-3)}

.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.match-grid{grid-template-columns:1fr}}
.mc{background:var(--paper);border:1px solid var(--paper-3);border-radius:var(--r-lg);padding:20px;cursor:pointer;opacity:0;transform:translateY(10px);transition:border-color .2s,transform .25s,box-shadow .25s,opacity .4s}
.mc.show{opacity:1;transform:translateY(0)}
.mc:hover{border-color:var(--purple);transform:translateY(-2px);box-shadow:0 8px 28px rgba(80,70,200,.09)}
.mc-top{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.rank-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;flex-shrink:0}
.rb-1{background:var(--gold-lt);color:var(--gold)}
.rb-2{background:var(--paper-2);color:var(--ink-2)}
.rb-3{background:var(--coral-lt);color:var(--coral)}
.rb-n{background:var(--paper-2);color:var(--ink-3);font-size:10px}
.compat-tag{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500}
.ct-k{background:var(--purple-lt);color:var(--purple)}
.ct-h{background:var(--teal-lt);color:var(--teal)}
.ct-o{background:var(--paper-2);color:var(--ink-3)}
.mc-name{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:600;margin-bottom:2px}
.mc-sub{font-size:12px;color:var(--ink-3);margin-bottom:12px}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.score-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--purple);min-width:42px}
.score-track{flex:1;height:4px;background:var(--paper-2);border-radius:2px;overflow:hidden}
.score-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--purple),var(--purple-2));transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.mc-reason{font-size:12px;line-height:1.75;color:var(--ink-2);border-top:1px solid var(--paper-3);padding-top:10px}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.nav-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-family:'Shippori Mincho',serif;font-size:13px;font-weight:600;color:var(--purple);background:var(--purple-lt);border:1px solid rgba(80,70,200,.2);border-radius:20px;cursor:pointer;text-decoration:none;transition:background .15s,transform .1s;letter-spacing:.04em}
.nav-btn:hover{background:#dddafc;transform:translateY(-1px)}

/* Quiz section */
.quiz-divider{height:1px;background:var(--paper-3);margin:20px 0 18px}
.quiz-section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px}
.quiz-q{margin-bottom:18px}
.quiz-q-text{font-size:13px;font-weight:500;color:var(--ink);line-height:1.5;margin-bottom:10px}
.quiz-options{display:flex;flex-direction:column;gap:7px}
.quiz-opt{display:flex;align-items:center;gap:9px;padding:9px 12px;border:1px solid var(--paper-3);border-radius:var(--r);cursor:pointer;transition:border-color .15s,background .15s;font-size:13px;color:var(--ink-2);background:var(--paper)}
.quiz-opt:hover{border-color:var(--purple-2);background:var(--purple-lt)}
.quiz-opt input[type=radio]{accent-color:var(--purple);width:15px;height:15px;flex-shrink:0;cursor:pointer}
.quiz-opt.selected{border-color:var(--purple);background:var(--purple-lt);color:var(--purple)}
</style>
</head>
<body>
<div class="shell">

<header>
    <div>
      <div class="logo">glitt<em>e</em>r</div>
      <div class="logo-sub">Business Compatibility</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="member-count">
        <strong id="memberNum" class="mc-pulse">…</strong>
        members
      </div>
      <a class="nav-btn" href="member.html">メンバーページ →</a>
    </div>
  </header>

  <div class="init-error" id="initError">
    <div class="init-error-title">メンバーデータの読み込みに失敗しました</div>
    <div class="init-error-msg" id="initErrorMsg"></div>
  </div>

  <div class="layout">
    <aside>
      <div class="panel">
        <div class="panel-title">ゲスト情報</div>
        <div class="field"><label>氏名</label><input type="text" id="fName" placeholder="例：田中 健二"></div>
        <div class="field"><label>会社名</label><input type="text" id="fCompany" placeholder="例：株式会社〇〇"></div>
        <div class="field"><label>業界・事業領域</label><input type="text" id="fIndustry" placeholder="例：SaaS、製造業、広告"></div>
        <div class="field"><label>役職</label><input type="text" id="fRole" placeholder="例：マーケティング部長"></div>
        <div class="field">
          <label>年代</label>
          <div class="select-wrap">
            <select id="fAge">
              <option value="">選択してください</option>
              <option>20代</option><option>30代</option><option>40代</option>
              <option>50代</option><option>60代以上</option>
            </select>
          </div>
        </div>
        <!-- アンケート3問 -->
        <div class="quiz-divider"></div>
        <div class="quiz-section-label">スタイル診断（3問）</div>

        <div class="quiz-q">
          <div class="quiz-q-text">Q1. 新しいことを始めるとき、あなたに近いのは？</div>
          <div class="quiz-options">
            <label class="quiz-opt"><input type="radio" name="q1" value="a">まず動いて、走りながら考える</label>
            <label class="quiz-opt"><input type="radio" name="q1" value="b">情報を集めてから慎重に判断する</label>
            <label class="quiz-opt"><input type="radio" name="q1" value="c">周囲と相談しながら合意して進める</label>
          </div>
        </div>

        <div class="quiz-q">
          <div class="quiz-q-text">Q2. 仕事の約束・締め切りに対して、あなたは？</div>
          <div class="quiz-options">
            <label class="quiz-opt"><input type="radio" name="q2" value="a">余裕をもって必ず守る。遅れは論外</label>
            <label class="quiz-opt"><input type="radio" name="q2" value="b">基本守るが、状況によって柔軟に調整する</label>
            <label class="quiz-opt"><input type="radio" name="q2" value="c">完成度を上げるためなら多少ずれても仕方ない</label>
          </div>
        </div>

        <div class="quiz-q">
          <div class="quiz-q-text">Q3. 気になる人がいたとき、あなたは？</div>
          <div class="quiz-options">
            <label class="quiz-opt"><input type="radio" name="q3" value="a">すぐ連絡してアポを取る</label>
            <label class="quiz-opt"><input type="radio" name="q3" value="b">共通の知人に繋いでもらうよう動く</label>
            <label class="quiz-opt"><input type="radio" name="q3" value="c">まずSNSや記事で相手を調べてから</label>
          </div>
        </div>

                <button class="btn" id="analyzeBtn" onclick="analyze()">相性を診断する</button>
      </div>
    </aside>

    <main class="results">
      <div class="empty-state" id="emptyState">
        <div class="empty-glyph">◈</div>
        <div class="empty-text">ゲストの情報を入力して<br>相性診断を実行してください</div>
      </div>

      <div class="guest-card" id="guestCard">
        <div class="gc-label">GUEST PROFILE</div>
        <div class="gc-name" id="gcName"></div>
        <div class="gc-meta" id="gcMeta"></div>
        <div class="type-pill t1" id="gcType"></div>
        <div class="gc-analysis" id="gcAnalysis"></div>
        <div class="axes">
          <div><div class="ax-name">関心の広さ</div><div class="ax-track"><div class="ax-fill" id="axA" style="width:0%"></div></div><div class="ax-val" id="axAv"></div></div>
          <div><div class="ax-name">革新指数</div><div class="ax-track"><div class="ax-fill" id="axB" style="width:0%"></div></div><div class="ax-val" id="axBv"></div></div>
          <div><div class="ax-name">行動スタイル</div><div class="ax-track"><div class="ax-fill" id="axC" style="width:0%"></div></div><div class="ax-val" id="axCv"></div></div>
        </div>
      </div>

      <div class="sec-hdr" id="secHdr">
        <div class="sec-title">相性 TOP 7</div>
        <div class="sec-pill" id="secCount"></div>
      </div>
      <div class="match-grid" id="matchGrid"></div>
    </main>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// メンバーデータ（スプレッドシートの②スコア計算と同期）
const API_URL = 'https://script.google.com/macros/s/AKfycbzMHyTT6uq8YR1iZPNn6PunpYYYZh4N_bAoQQllEdwtytAlRJeZFdSldCXZ6wfvimlb/exec';

// ════════════════════════════════════════════════════════════
// ▲▲▲  運営者設定エリア  ▲▲▲
// ════════════════════════════════════════════════════════════


// ── メンバーデータ ───────────────────────────────────────────
let MEMBERS = [];

// ── タイプ相性ボーナス ───────────────────────────────────────
const BONUS = {
  '1_1':15,'1_2':10,'1_3':12,'1_4':3, '1_5':8,
  '2_1':10,'2_2':15,'2_3':10,'2_4':11,'2_5':8,
  '3_1':12,'3_2':10,'3_3':15,'3_4':13,'3_5':8,
  '4_1':3, '4_2':11,'4_3':13,'4_4':15,'4_5':8,
  '5_1':8, '5_2':8, '5_3':8, '5_4':8, '5_5':10,
};

// ── タイプ定義 ───────────────────────────────────────────────
const TYPES = [
  { id:1, name:'革新推進型' },
  { id:2, name:'広域探索型' },
  { id:3, name:'堅実構築型' },
  { id:4, name:'専門深化型' },
  { id:5, name:'バランス型' },
];

// ── 役職キーワードによるタイプ推定 ──────────────────────────
const ROLE_SIGNALS = [
  { keywords:['CTO','エンジニア','テック','開発','IT','DX','AI','デジタル'], axisB:+3, flex:+2, typeHint:1 },
  { keywords:['CEO','代表','社長','創業','スタートアップ','起業'],           axisB:+2, flex:+2, typeHint:1 },
  { keywords:['マーケ','広告','PR','ブランド','コミュニケーション'],          axisA:+2, axisB:+1, typeHint:2 },
  { keywords:['事業開発','BD','アライアンス','パートナー','新規'],            axisA:+3, axisB:+1, typeHint:2 },
  { keywords:['CFO','財務','経理','会計','投資','ファイナンス'],              solid:+3, axisB:-1, typeHint:3 },
  { keywords:['法務','コンプライアンス','リスク','監査'],                     solid:+3, flex:-2,  typeHint:3 },
  { keywords:['研究','R&D','専門','シニア','チーフ','スペシャリスト'],        axisA:-2, solid:+1, typeHint:4 },
  { keywords:['HR','人事','組織','採用','人材','研修'],                       solid:+1, axisA:-1, typeHint:4 },
  { keywords:['コンサル','戦略','アドバイザー'],                              axisA:+1, axisB:+1, typeHint:5 },
  { keywords:['営業','セールス','カスタマー','CS'],                           flex:+1,  axisA:+1, typeHint:5 },
];

// ── 業界キーワード ───────────────────────────────────────────
const INDUSTRY_SIGNALS = [
  { keywords:['テック','IT','SaaS','ソフト','アプリ','クラウド','AI'],       axisB:+2, domains:+2 },
  { keywords:['製造','工業','ものづくり','メーカー'],                         solid:+2, domains:-1 },
  { keywords:['金融','銀行','保険','証券','投資'],                            solid:+2, axisB:-1  },
  { keywords:['医療','ヘルス','バイオ','薬'],                                 solid:+1, domains:-1 },
  { keywords:['教育','学校','研修','スクール'],                               axisA:+1, solid:+1  },
  { keywords:['クリエイティブ','デザイン','広告','エンタメ','メディア'],      flex:+2,  axisB:+1  },
  { keywords:['不動産','建設','建築'],                                        solid:+2, axisA:-1  },
  { keywords:['小売','EC','流通','商社'],                                     axisA:+1, flex:+1   },
  { keywords:['グローバル','海外','インバウンド','輸出'],                     axisA:+3, domains:+2 },
  { keywords:['社会','SDGs','NPO','NGO','公共'],                             axisA:+2, axisB:+1  },
];

// ── 年代による補正 ───────────────────────────────────────────
const AGE_PARAMS = {
  '20代': { axisB:+2, flex:+2, solid:-1 },
  '30代': { axisB:+1, flex:+1 },
  '40代': { },
  '50代': { solid:+1, axisB:-1 },
  '60代以上': { solid:+2, axisB:-2, flex:-1 },
};

// ── タイプ別説明文テンプレート ──────────────────────────────
const TYPE_ANALYSIS = {
  1: [
    '新しいアイデアを即座に実行に移す推進力が強みです。変化を機会と捉え、スピード感をもってビジネスを動かします。',
    '革新的な取り組みを積極的に推進するタイプです。テクノロジーや新手法への感度が高く、実行力があります。',
  ],
  2: [
    '幅広い領域に関心を持ち、異業種のつながりから新たな価値を生み出すタイプです。多彩なネットワークが強みです。',
    '横断的な視野でビジネスを捉え、さまざまな領域をつなぐ役割を担います。新しい出会いから化学反応を生みます。',
  ],
  3: [
    '実績と信頼を着実に積み上げ、安定した成果を出し続けるタイプです。長期的な関係構築を大切にします。',
    'データと根拠をもとに判断し、リスクを丁寧に管理しながら進めます。信頼感と継続性が最大の強みです。',

// ── クイズ選択ハイライト ─────────────────────────────────────
document.addEventListener('change', e => {
  if (e.target.type === 'radio') {
    const name = e.target.name;
    document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
      r.closest('.quiz-opt').classList.toggle('selected', r.checked);
    });
  }
});

// ── 起動時にメンバー自動読込 ─────────────────────────────────
window.addEventListener('DOMContentLoaded', initMembers);

function initMembers() {
  // JSONP で読み込む（CORSを回避）
  const callbackName = 'glitterCallback_' + Date.now();
  const timeout = setTimeout(() => {
    showMemberError('タイムアウト：Apps Scriptに接続できませんでした');
    delete window[callbackName];
  }, 10000);

  window[callbackName] = function(data) {
    clearTimeout(timeout);
    delete window[callbackName];
    MEMBERS = (data.members || []).map(m => ({
      ...m,
      axisA  : Number(m.axisA)   || 0,
      axisB  : Number(m.axisB)   || 0,
      flex   : Number(m.flex)    || 0,
      solid  : Number(m.solid)   || 0,
      typeId : Number(m.typeId)  || 5,
      domains: Number(m.domains) || 6,
    }));
    const el = document.getElementById('memberNum');
    el.textContent = MEMBERS.length;
    el.classList.remove('mc-pulse');
    // scriptタグを削除
    const s = document.getElementById('jsonp-script');
    if (s) s.remove();
  };

  const script = document.createElement('script');
  script.id  = 'jsonp-script';
  script.src = API_URL + '?callback=' + callbackName;
  script.onerror = () => {
    clearTimeout(timeout);
    delete window[callbackName];
    showMemberError('スクリプト読み込みエラー');
  };
  document.head.appendChild(script);
}

function showMemberError(msg) {
  const el = document.getElementById('memberNum');
  el.textContent = '!';
  el.classList.remove('mc-pulse');
  el.style.color = 'var(--coral)';
  document.getElementById('initErrorMsg').textContent = msg;
  document.getElementById('initError').style.display = 'block';
}


function nv(v){ return isNaN(Number(v))?0:Number(v); }

// ── ゲスト情報からスコアをルールベース推定 ────────────────────
function estimateGuest(name, company, industry, role, age, q1, q2, q3) {
  // 基準値
  let axisA=10, axisB=9, flex=5, solid=5, domains=5;

  // 役職シグナル
  const roleStr = (role+' '+company).toLowerCase();
  for (const sig of ROLE_SIGNALS) {
    if (sig.keywords.some(k => roleStr.includes(k.toLowerCase()))) {
      if (sig.axisA) axisA += sig.axisA;
      if (sig.axisB) axisB += sig.axisB;
      if (sig.flex)  flex  += sig.flex;
      if (sig.solid) solid += sig.solid;
    }
  }

  // 業界シグナル
  const indStr = (industry).toLowerCase();
  for (const sig of INDUSTRY_SIGNALS) {
    if (sig.keywords.some(k => indStr.includes(k.toLowerCase()))) {
      if (sig.axisA)   axisA   += sig.axisA;
      if (sig.axisB)   axisB   += sig.axisB;
      if (sig.flex)    flex    += sig.flex;
      if (sig.solid)   solid   += sig.solid;
      if (sig.domains) domains += sig.domains;
    }
  }

  // 年代補正
  const ageAdj = AGE_PARAMS[age] || {};
  if (ageAdj.axisB)  axisB  += ageAdj.axisB;
  if (ageAdj.flex)   flex   += ageAdj.flex;
  if (ageAdj.solid)  solid  += ageAdj.solid;

  // Q1: 行動スタイル（即断 vs 慎重 vs 合意）
  // a=まず動く → flex↑ axisB↑（革新推進寄り）
  // b=情報収集 → solid↑ flex↓（堅実寄り）
  // c=相談合意 → axisA↑ domains↑（広域探索寄り）
  if (q1 === 'a') { flex += 2; axisB += 1; }
  else if (q1 === 'b') { solid += 2; flex -= 1; }
  else if (q1 === 'c') { axisA += 2; domains += 1; }

  // Q2: 真面目さ・規律感（締め切り姿勢）
  // a=必ず守る → solid↑↑（堅実構築型強化）
  // b=柔軟調整 → そのまま（バランス型補強）
  // c=完成度優先 → axisB↑ flex↑（革新・クリエイティブ寄り）
  if (q2 === 'a') { solid += 3; flex -= 1; }
  else if (q2 === 'b') { /* 中間 */ }
  else if (q2 === 'c') { axisB += 1; flex += 1; solid -= 1; }

  // Q3: 行動力・人脈スタイル
  // a=即アポ → flex↑ axisB↑（推進力強）
  // b=紹介経由 → axisA↑ domains↑（広域探索型）
  // c=事前調査 → solid↑（慎重・専門深化寄り）
  if (q3 === 'a') { flex += 2; axisB += 1; }
  else if (q3 === 'b') { axisA += 2; domains += 1; }
  else if (q3 === 'c') { solid += 1; axisA -= 1; }

  // クランプ
  axisA   = Math.max(0,  Math.min(20, axisA));
  axisB   = Math.max(3,  Math.min(15, axisB));
  flex    = Math.max(0,  Math.min(11, flex));
  solid   = Math.max(0,  Math.min(11, solid));
  domains = Math.max(1,  Math.min(12, domains));

  // タイプ判定
  let typeId = 5;
  if      (axisB >= 11 && flex >= 7)  typeId = 1;
  else if (axisA >= 14)               typeId = 2;
  else if (solid >= 7 && axisB <= 8)  typeId = 3;
  else if (axisA <= 7)                typeId = 4;

  const typeName = TYPES.find(t=>t.id===typeId)?.name || 'バランス型';
  const analyses = TYPE_ANALYSIS[typeId];
  const analysis = analyses[Math.floor(Math.random()*analyses.length)];

  return { name, company, industry, role, age, axisA, axisB, flex, solid, domains, typeId, typeName, analysis };
}

// ── 相性スコア計算 ───────────────────────────────────────────
function calcScore(g, m) {
  const sA    = Math.round((1 - Math.abs(g.axisA - m.axisA) / 20) * 20);
  const sB    = Math.round((1 - Math.abs(g.axisB - m.axisB) / 12) * 20);
  const sC    = Math.round((Math.abs(g.flex - m.solid) + Math.abs(m.flex - g.solid)) / 20 * 25);
  const maxD  = Math.max(g.domains, m.domains, 1);
  const sD    = Math.round(Math.min(g.domains, m.domains) / maxD * 20);
  const bonus = BONUS[`${g.typeId}_${m.typeId}`] ?? 8;
  return Math.min(100, sA + sB + sC + sD + bonus);
}

// ── 相性コメント取得 ─────────────────────────────────────────
function getComment(gTypeId, mTypeId, score) {
  const key = `${gTypeId}_${mTypeId}`;
  const arr = COMPAT_COMMENTS[key] || ['ビジネスの接点を見つけ、新しい関係を築けます。', '様々な場面でのコラボレーションが期待されます。', '互いの強みを活かせる場面を探しましょう。'];
  const idx = score >= 80 ? 0 : score >= 55 ? 1 : 2;
  return arr[idx];
}

// ── 診断実行 ─────────────────────────────────────────────────
function analyze() {
  const name     = document.getElementById('fName').value.trim();
  const company  = document.getElementById('fCompany').value.trim();
  const industry = document.getElementById('fIndustry').value.trim();
  const role     = document.getElementById('fRole').value.trim();
  const age      = document.getElementById('fAge').value;
  const q1       = document.querySelector('input[name="q1"]:checked')?.value || '';
  const q2       = document.querySelector('input[name="q2"]:checked')?.value || '';
  const q3       = document.querySelector('input[name="q3"]:checked')?.value || '';

  if (!name)           { alert('氏名を入力してください'); return; }
  if (!MEMBERS.length) { alert('メンバーデータを読み込み中です。しばらくお待ちください。'); return; }

  document.getElementById('emptyState').style.display = 'none';

  // ゲスト推定（即時）
  const guest = estimateGuest(name, company, industry, role, age, q1, q2, q3);

  // 相性スコア計算 → TOP7
  const scored = MEMBERS
    .map(m => ({ ...m, score: calcScore(guest, m) }))
    .sort((a,b) => b.score - a.score)
    .slice(0, 7);

  // 相性コメント
  const reasons = scored.map(m => getComment(guest.typeId, m.typeId, m.score));

  renderGuest(guest);
  renderMatches(scored, reasons);
}

// ── 描画 ──────────────────────────────────────────────────────
function renderGuest(g) {
  document.getElementById('gcName').textContent = g.name;
  document.getElementById('gcMeta').textContent = [g.role,g.company,g.industry,g.age].filter(Boolean).join(' · ');
  const tb = document.getElementById('gcType');
  tb.textContent = g.typeName; tb.className = 'type-pill t'+g.typeId;
  document.getElementById('gcAnalysis').textContent = g.analysis;
  setTimeout(()=>{
    document.getElementById('axA').style.width  = (g.axisA/20*100)+'%';
    document.getElementById('axB').style.width  = ((g.axisB-3)/12*100)+'%';
    document.getElementById('axC').style.width  = (g.flex/11*100)+'%';
    document.getElementById('axAv').textContent = g.axisA+' / 20';
    document.getElementById('axBv').textContent = g.axisB+' / 15';
    document.getElementById('axCv').textContent = g.flex +' / 11';
  }, 60);
  document.getElementById('guestCard').classList.add('show');
}

function renderMatches(members, reasons) {
  const grid = document.getElementById('matchGrid');
  grid.innerHTML = '';
  document.getElementById('secHdr').classList.add('show');
  document.getElementById('secCount').textContent = members.length+' 名';

  members.forEach((m,i) => {
    const rank  = i+1;
    const compat = m.score>=80?'◎ 共鳴型':m.score>=55?'◯ 補完型':'△ 要調整';
    const ctCls  = m.score>=80?'ct-k':m.score>=55?'ct-h':'ct-o';
    const rbCls  = rank===1?'rb-1':rank===2?'rb-2':rank===3?'rb-3':'rb-n';
    const card = document.createElement('div');
    card.className = 'mc';
    card.innerHTML = `
      <div class="mc-top">
        <div class="rank-badge ${rbCls}">${rank}</div>
        <div class="compat-tag ${ctCls}">${compat}</div>
      </div>
      <div class="mc-name">${m.name}</div>
      <div class="mc-sub">${m.role} · ${m.typeName}</div>
      <div class="score-row">
        <div class="score-val">${m.score}</div>
        <div class="score-track"><div class="score-fill" style="width:0%"></div></div>
      </div>
      <div class="mc-reason">${reasons[i]||'—'}</div>
    `;
    grid.appendChild(card);
    setTimeout(()=>{
      card.classList.add('show');
      card.querySelector('.score-fill').style.width = m.score+'%';
    }, 80+i*65);
  });
}
